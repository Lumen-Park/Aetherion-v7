version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: aetherion-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama-gpu:
    extends:
      service: ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles: ["gpu"]

  chromadb:
    image: chromadb/chroma:latest
    container_name: aetherion-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: aetherion-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: aetherion-api
    runtime: runsc
    ports:
      - "8000:8000"
    volumes:
      - ./workspaces:/app/workspaces
      - ./logs:/app/logs
      - ./reports:/app/reports
      - ./audit:/app/audit
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - AETHERION_REQUIRE_AUTH=${AETHERION_REQUIRE_AUTH:-false}
      - AETHERION_JWT_SECRET=${AETHERION_JWT_SECRET:-change-me-in-production}
      - AETHERION_OAUTH_PROVIDERS=${AETHERION_OAUTH_PROVIDERS:-}
      - AETHERION_OAUTH_GOOGLE_CLIENT_ID=${AETHERION_OAUTH_GOOGLE_CLIENT_ID:-}
      - AETHERION_OAUTH_GOOGLE_CLIENT_SECRET=${AETHERION_OAUTH_GOOGLE_CLIENT_SECRET:-}
      - AETHERION_AUDIT_PRIVATE_KEY=${AETHERION_AUDIT_PRIVATE_KEY:-/app/audit/audit_private.pem}
      - SANDBOX_NETWORK_MODE=${SANDBOX_NETWORK_MODE:-none}
      - SANDBOX_ALLOWED_DOMAINS=${SANDBOX_ALLOWED_DOMAINS:-}
      - SANDBOX_ALLOWED_CIDRS=${SANDBOX_ALLOWED_CIDRS:-}
      - SANDBOX_RUNTIME=${SANDBOX_RUNTIME:-runsc}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      ollama:
        condition: service_healthy
      chromadb:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: aetherion-celery-worker
    command: celery -A api.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./workspaces:/app/workspaces
      - ./logs:/app/logs
      - ./reports:/app/reports
      - ./audit:/app/audit
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - AETHERION_REQUIRE_AUTH=${AETHERION_REQUIRE_AUTH:-false}
      - AETHERION_JWT_SECRET=${AETHERION_JWT_SECRET:-change-me-in-production}
      - AETHERION_AUDIT_PRIVATE_KEY=${AETHERION_AUDIT_PRIVATE_KEY:-/app/audit/audit_private.pem}
      - SANDBOX_NETWORK_MODE=${SANDBOX_NETWORK_MODE:-none}
      - SANDBOX_ALLOWED_DOMAINS=${SANDBOX_ALLOWED_DOMAINS:-}
      - SANDBOX_ALLOWED_CIDRS=${SANDBOX_ALLOWED_CIDRS:-}
      - SANDBOX_RUNTIME=${SANDBOX_RUNTIME:-runsc}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      - redis
      - api
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: aetherion-dashboard
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: aetherion-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - dashboard
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: aetherion-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: aetherion-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.0
    container_name: aetherion-loki
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.0
    container_name: aetherion-promtail
    volumes:
      - ./logs:/var/log/aetherion:ro
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  ollama_data:
  chroma_data:
  loki_data:
