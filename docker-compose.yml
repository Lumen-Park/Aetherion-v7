services:
  alertmanager:
    container_name: aetherion-alertmanager
    image: prom/alertmanager:latest
    ports:
    - 9093:9093
    restart: unless-stopped
    volumes:
    - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: aetherion-api
    depends_on:
      chromadb:
        condition: service_started
      redis:
        condition: service_started
    environment:
    - OLLAMA_HOST=http://ollama:11434
    - CHROMA_HOST=chromadb
    - CHROMA_PORT=8000
    - AETHERION_REQUIRE_AUTH=${AETHERION_REQUIRE_AUTH:-false}
    - AETHERION_JWT_SECRET=${AETHERION_JWT_SECRET:-change-me-in-production}
    - AETHERION_OAUTH_PROVIDERS=${AETHERION_OAUTH_PROVIDERS:-}
    - AETHERION_OAUTH_GOOGLE_CLIENT_ID=${AETHERION_OAUTH_GOOGLE_CLIENT_ID:-}
    - AETHERION_OAUTH_GOOGLE_CLIENT_SECRET=${AETHERION_OAUTH_GOOGLE_CLIENT_SECRET:-}
    - AETHERION_AUDIT_PRIVATE_KEY=${AETHERION_AUDIT_PRIVATE_KEY:-/app/audit/audit_private.pem}
    - SANDBOX_NETWORK_MODE=${SANDBOX_NETWORK_MODE:-none}
    - SANDBOX_ALLOWED_DOMAINS=${SANDBOX_ALLOWED_DOMAINS:-}
    - SANDBOX_ALLOWED_CIDRS=${SANDBOX_ALLOWED_CIDRS:-}
    - SANDBOX_RUNTIME=${SANDBOX_RUNTIME:-runsc}
    - CELERY_BROKER_URL=redis://redis:6379/0
    - CELERY_RESULT_BACKEND=redis://redis:6379/1
    ports:
    - 8000:8000
    restart: unless-stopped
    volumes:
    - ./workspaces:/app/workspaces
    - ./logs:/app/logs
    - ./reports:/app/reports
    - ./audit:/app/audit
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: celery -A api.celery_app worker --loglevel=info --concurrency=4
    container_name: aetherion-celery-worker
    depends_on:
    - redis
    - api
    environment:
    - OLLAMA_HOST=http://ollama:11434
    - CHROMA_HOST=chromadb
    - CHROMA_PORT=8000
    - AETHERION_REQUIRE_AUTH=${AETHERION_REQUIRE_AUTH:-false}
    - AETHERION_JWT_SECRET=${AETHERION_JWT_SECRET:-change-me-in-production}
    - AETHERION_AUDIT_PRIVATE_KEY=${AETHERION_AUDIT_PRIVATE_KEY:-/app/audit/audit_private.pem}
    - SANDBOX_NETWORK_MODE=${SANDBOX_NETWORK_MODE:-none}
    - SANDBOX_ALLOWED_DOMAINS=${SANDBOX_ALLOWED_DOMAINS:-}
    - SANDBOX_ALLOWED_CIDRS=${SANDBOX_ALLOWED_CIDRS:-}
    - SANDBOX_RUNTIME=${SANDBOX_RUNTIME:-runsc}
    - CELERY_BROKER_URL=redis://redis:6379/0
    - CELERY_RESULT_BACKEND=redis://redis:6379/1
    restart: unless-stopped
    volumes:
    - ./workspaces:/app/workspaces
    - ./logs:/app/logs
    - ./reports:/app/reports
    - ./audit:/app/audit
  chemistagent:
    build:
      context: .
      dockerfile: agents/services/Dockerfile.agent
    container_name: aetherion-chemistagent
    environment:
    - AETHERION_AGENT=PharmacologistAgent
    - OLLAMA_HOST=ollama:11434
    restart: unless-stopped
  chromadb:
    container_name: aetherion-chromadb
    environment:
    - IS_PERSISTENT=TRUE
    - ANONYMIZED_TELEMETRY=FALSE
    image: chromadb/chroma:latest
    ports:
    - 8001:8000
    restart: unless-stopped
    volumes:
    - chroma_data:/chroma/chroma
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: aetherion-dashboard
    depends_on:
    - api
    ports:
    - 3000:80
    restart: unless-stopped
  grafana:
    container_name: aetherion-grafana
    depends_on:
    - prometheus
    - loki
    environment:
    - GF_SECURITY_ADMIN_PASSWORD=admin
    image: grafana/grafana:latest
    ports:
    - 3001:3000
    restart: unless-stopped
    volumes:
    - ./grafana/provisioning:/etc/grafana/provisioning
  loki:
    command: -config.file=/etc/loki/local-config.yaml
    container_name: aetherion-loki
    image: grafana/loki:2.9.0
    ports:
    - 3100:3100
    restart: unless-stopped
    volumes:
    - loki_data:/loki
  nginx:
    container_name: aetherion-nginx
    depends_on:
    - api
    - dashboard
    image: nginx:alpine
    ports:
    - 80:80
    - 443:443
    restart: unless-stopped
    volumes:
    - ./nginx.conf:/etc/nginx/nginx.conf:ro
    - ./ssl:/etc/nginx/ssl:ro
  ollama:
    container_name: aetherion-ollama
    environment:
    - OLLAMA_KEEP_ALIVE=24h
    image: ollama/ollama:latest
    ports:
    - 11434:11434
    restart: unless-stopped
    volumes:
    - ollama_data:/root/.ollama
  ollama-gpu:
    deploy:
      resources:
        reservations:
          devices:
          - capabilities:
            - gpu
            count: all
            driver: nvidia
    extends:
      service: ollama
    profiles:
    - gpu
  physicistagent:
    build:
      context: .
      dockerfile: agents/services/Dockerfile.agent
    container_name: aetherion-physicistagent
    environment:
    - AETHERION_AGENT=TheoreticalPhysicsAgent
    - OLLAMA_HOST=ollama:11434
    restart: unless-stopped
  prometheus:
    container_name: aetherion-prometheus
    image: prom/prometheus:latest
    ports:
    - 9090:9090
    restart: unless-stopped
    volumes:
    - ./prometheus.yml:/etc/prometheus/prometheus.yml
    - ./aetherion-alerts.yml:/etc/prometheus/aetherion-alerts.yml
  promtail:
    command: -config.file=/etc/promtail/config.yml
    container_name: aetherion-promtail
    depends_on:
    - loki
    image: grafana/promtail:2.9.0
    restart: unless-stopped
    volumes:
    - ./logs:/var/log/aetherion:ro
    - ./promtail-config.yml:/etc/promtail/config.yml
  redis:
    container_name: aetherion-redis
    image: redis:alpine
    ports:
    - 6379:6379
    restart: unless-stopped
version: '3.8'
volumes:
  chroma_data: null
  loki_data: null
  ollama_data: null
