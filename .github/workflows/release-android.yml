```yaml
name: Build Android APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: aetherion-mobile
        run: npm ci

      - name: Login to Expo
        working-directory: aetherion-mobile
        run: npx expo login -u ${{ secrets.EXPO_USERNAME }} -p ${{ secrets.EXPO_PASSWORD }}

      - name: Build Android APK
        working-directory: aetherion-mobile
        run: npx eas build --platform android --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download APK from Expo
        run: |
          # Wait for build to finish and get the URL
          BUILD_URL=$(eas build:list --platform android --status finished --limit 1 --json | jq -r '.[0].artifacts.applicationUrl')
          curl -L "$BUILD_URL" -o aetherion-android.apk

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: aetherion-android.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
