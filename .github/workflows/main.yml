name: Aetherion CI/CD

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_integration:
        description: 'Run integration tests'
        type: boolean
        default: false
      deploy:
        description: 'Deploy to staging'
        type: boolean
        default: false

env:
  OLLAMA_HOST: "http://localhost:11434"
  AETHERION_TEST_MODE: "true"
  PYTHONPATH: ${{ github.workspace }}

jobs:
  # --------------------------------------------------------------------------
  # 1. Static Analysis & Linting
  # --------------------------------------------------------------------------
  lint:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements.txt') }}
      - name: Install linters
        run: |
          pip install flake8 bandit safety
      - name: Run flake8
        run: |
          flake8 core/ agents/ --count --max-complexity=10 --statistics
      - name: Run Bandit (security lint)
        run: |
          bandit -r core/ agents/ -ll
      - name: Check dependencies for known vulnerabilities
        run: |
          safety check -r requirements.txt --full-report || true

  # --------------------------------------------------------------------------
  # 2. Unit Tests (Matrix)
  # --------------------------------------------------------------------------
  test:
    name: Python ${{ matrix.python-version }} – ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
      - name: Install system dependencies (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev
      - name: Install system dependencies (macOS only)
        if: matrix.os == 'macos-latest'
        run: |
          brew install portaudio
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist
      - name: Run tests with coverage
        run: |
          pytest -n auto \
            --cov=core --cov=agents/council --cov=agents/governance \
            --cov-report=term --cov-report=html --cov-report=xml \
            --cov-fail-under=60 \
            --junitxml=junit.xml
      - name: Upload coverage to Codecov (optional)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: aetherion-coverage
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            junit.xml
            htmlcov/

  # --------------------------------------------------------------------------
  # 3. Integration Tests (optional)
  # --------------------------------------------------------------------------
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_integration
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y portaudio19-dev docker
          pip install -r requirements.txt
      - name: Run end‑to‑end pipeline test
        run: |
          python main.py --mode pipeline "Write a function that returns the sum of two numbers"

  # --------------------------------------------------------------------------
  # 4. Auto‑format Code (fixes lint errors)
  # --------------------------------------------------------------------------
  format:
    name: Auto-format code
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install black isort
      - run: black agents/ core/ tests/ mission/ utils/ --line-length 79
      - run: isort agents/ core/ tests/ mission/ utils/
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: apply auto-formatting"

  # --------------------------------------------------------------------------
  # 5. Build & Package
  # --------------------------------------------------------------------------
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build tools
        run: pip install build wheel
      - name: Build wheel and sdist
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # --------------------------------------------------------------------------
  # 6. GitHub Release (on tag)
  # --------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Generate changelog
        id: changelog
        run: |
          git log --pretty=format:"* %s (%h)" $(git describe --tags --abbrev=0 HEAD^)..HEAD > CHANGELOG.md
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat CHANGELOG.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --------------------------------------------------------------------------
  # 7. Deploy to Staging (optional)
  # --------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'workflow_dispatch' && inputs.deploy
    environment:
      name: staging
      url: https://staging.aetherion.ai
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder – deploy via SSH/SCP
        run: |
          echo "Deploying to staging server..."
          echo "Deployment would happen here."

  # --------------------------------------------------------------------------
  # 8. Notifications (optional)
  # --------------------------------------------------------------------------
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [test, build]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Send Slack notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status }}
          SLACK_TITLE: "Aetherion CI Status"
          SLACK_MESSAGE: "Build ${{ job.status }} on ${{ github.ref }}"
